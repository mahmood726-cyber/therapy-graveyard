<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.plot.ly; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'">
<title>TherapyGraveyard — Cardiovascular Drug &amp; Technique Attrition Map</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #f8f9fa;
  --bg-card: #ffffff;
  --text: #212529;
  --text-muted: #6c757d;
  --border: #dee2e6;
  --accent: #0d6efd;
  --accent-hover: #0b5ed7;
  --dead: #dc3545;
  --declining: #c96600;
  --alive: #198754;
  --zombie: #6f42c1;
  --header-bg: #1a1a2e;
  --header-text: #e8e8e8;
  --toolbar-bg: #f0f0f0;
  --btn-bg: #e9ecef;
  --btn-active: #0d6efd;
  --btn-active-text: #fff;
  --shadow: rgba(0,0,0,0.08);
  --input-bg: #fff;
  --table-stripe: #f8f9fa;
  --badge-bg: #e9ecef;
}
[data-theme="dark"] {
  --bg: #121212;
  --bg-card: #1e1e1e;
  --text: #e0e0e0;
  --text-muted: #999;
  --border: #333;
  --accent: #4dabf7;
  --accent-hover: #339af0;
  --header-bg: #0d0d1a;
  --header-text: #e8e8e8;
  --toolbar-bg: #1a1a1a;
  --btn-bg: #2a2a2a;
  --btn-active: #4dabf7;
  --btn-active-text: #000;
  --shadow: rgba(0,0,0,0.3);
  --input-bg: #2a2a2a;
  --table-stripe: #252525;
  --badge-bg: #333;
}

/* ===== Skip Link (Accessibility) ===== */
.tg-skip-link {
  position: absolute;
  top: -100%;
  left: 8px;
  z-index: 10000;
  background: var(--accent);
  color: #fff;
  padding: 8px 16px;
  border-radius: 0 0 6px 6px;
  font-weight: 600;
  font-size: 0.9rem;
  text-decoration: none;
  transition: top 0.2s;
}
.tg-skip-link:focus {
  top: 0;
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

/* ===== Header ===== */
.tg-header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.tg-header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.tg-header h1 span.skull { margin-right: 8px; }
.tg-header .subtitle {
  font-size: 0.85rem;
  color: #aaa;
  margin-top: 2px;
}
.tg-theme-btn {
  background: transparent;
  border: 1px solid #555;
  color: var(--header-text);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: background 0.2s;
}
.tg-theme-btn:hover { background: rgba(255,255,255,0.1); }
.tg-theme-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ===== Toolbar ===== */
.tg-toolbar {
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
}
.tg-toolbar-group {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.tg-toolbar-group > label:first-child {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 4px;
  white-space: nowrap;
}
.tg-toolbar .sep {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 2px;
}
.tg-view-btn, .tg-level-btn {
  background: var(--btn-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 14px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.82rem;
  transition: all 0.15s;
}
.tg-view-btn:hover, .tg-level-btn:hover { border-color: var(--accent); }
.tg-view-btn:focus, .tg-level-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
.tg-view-btn.active, .tg-level-btn.active {
  background: var(--btn-active);
  color: var(--btn-active-text);
  border-color: var(--btn-active);
}
.tg-cb-group {
  display: flex;
  align-items: center;
  gap: 2px;
  font-size: 0.82rem;
  cursor: pointer;
  white-space: nowrap;
}
.tg-cb-group input[type="checkbox"] { margin-right: 3px; cursor: pointer; }
.tg-toolbar select {
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 8px;
  border-radius: 5px;
  font-size: 0.82rem;
  cursor: pointer;
}
.tg-toolbar select:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
.tg-export-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 5px 14px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  transition: background 0.15s;
  margin-left: auto;
}
.tg-export-btn:hover { background: var(--accent-hover); }
.tg-export-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ===== Main Content ===== */
.tg-main {
  padding: 16px 20px;
  max-width: 1600px;
  margin: 0 auto;
}
.tg-view { display: none; }
.tg-view.active { display: block; }

/* ===== Graveyard View ===== */
#tg-graveyard-chart { width: 100%; min-height: 600px; }
.tg-graveyard-info {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}

/* ===== Autopsy View ===== */
.tg-autopsy-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tg-back-btn {
  background: var(--btn-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 16px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.15s;
}
.tg-back-btn:hover { border-color: var(--accent); }
.tg-back-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
.tg-autopsy-title {
  font-size: 1.3rem;
  font-weight: 700;
}
.tg-status-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tg-status-badge.DEAD { background: var(--dead); }
.tg-status-badge.DECLINING { background: var(--declining); }
.tg-status-badge.ALIVE { background: var(--alive); }
.tg-status-badge.ZOMBIE { background: var(--zombie); }

.tg-autopsy-chart { width: 100%; height: 320px; margin-bottom: 16px; }

.tg-kill-panel {
  background: var(--bg-card);
  border: 1px solid var(--dead);
  border-left: 4px solid var(--dead);
  border-radius: 6px;
  padding: 14px 18px;
  margin-bottom: 16px;
}
.tg-kill-panel h3 { color: var(--dead); font-size: 0.95rem; margin-bottom: 8px; }
.tg-kill-panel .kill-event { margin-bottom: 6px; font-size: 0.88rem; }
.tg-kill-panel .kill-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.tg-kill-panel .kill-meta a { color: var(--accent); text-decoration: none; }
.tg-kill-panel .kill-meta a:hover { text-decoration: underline; }
.tg-kill-panel .kill-cat-badge {
  display: inline-block;
  background: var(--badge-bg);
  color: var(--text);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
}
.tg-kill-panel .kill-impact {
  margin-top: 4px;
  font-size: 0.82rem;
  font-style: italic;
  color: var(--text-muted);
}

.tg-metrics-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.tg-metric-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  text-align: center;
  box-shadow: 0 1px 3px var(--shadow);
}
.tg-metric-card .metric-value {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
}
.tg-metric-card .metric-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-top: 2px;
}

.tg-class-context { margin-top: 16px; }
.tg-class-context h3 { font-size: 0.95rem; margin-bottom: 8px; }
.tg-sparkline-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}
.tg-sparkline-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.tg-sparkline-card:hover { border-color: var(--accent); }
.tg-sparkline-card .spark-name {
  font-size: 0.78rem;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tg-sparkline-card .spark-chart { height: 50px; }

/* ===== Statistics View ===== */
.tg-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(440px, 1fr));
  gap: 16px;
}
.tg-stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  box-shadow: 0 1px 3px var(--shadow);
}
.tg-stat-card h3 {
  font-size: 0.92rem;
  font-weight: 700;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.tg-stat-chart { width: 100%; height: 300px; }

/* ===== Tables ===== */
.tg-table-wrap {
  overflow-x: auto;
  max-height: 400px;
  overflow-y: auto;
}
.tg-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}
.tg-table th {
  background: var(--toolbar-bg);
  position: sticky;
  top: 0;
  z-index: 1;
  padding: 8px 10px;
  text-align: left;
  font-weight: 700;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
.tg-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.tg-table tbody tr:nth-child(even) { background: var(--table-stripe); }
.tg-table tbody tr:hover { background: rgba(13,110,253,0.06); }

/* ===== Keyboard-accessible intervention list (P1-14) ===== */
.tg-kbd-list {
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 0;
}
.tg-kbd-list .tg-kbd-item {
  padding: 4px 12px;
  cursor: pointer;
  font-size: 0.82rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tg-kbd-list .tg-kbd-item:hover,
.tg-kbd-list .tg-kbd-item:focus {
  background: rgba(13,110,253,0.08);
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}
.tg-kbd-list .tg-kbd-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .tg-header { padding: 12px 14px; }
  .tg-header h1 { font-size: 1.2rem; }
  .tg-toolbar { padding: 8px 12px; gap: 8px; }
  .tg-main { padding: 10px 12px; }
  .tg-stats-grid { grid-template-columns: 1fr; }
  .tg-metrics-row { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<a href="#tg-main-content" class="tg-skip-link">Skip to main content</a>

<!-- ===== HEADER ===== -->
<header class="tg-header" role="banner">
  <div>
    <h1><span class="skull" aria-hidden="true">&#9760;</span>TherapyGraveyard</h1>
    <div class="subtitle">Cardiovascular Drug &amp; Technique Attrition Map (2005&ndash;2025)</div>
  </div>
  <button class="tg-theme-btn" id="tg-theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
    Dark Mode
  </button>
</header>

<!-- ===== TOOLBAR ===== -->
<nav class="tg-toolbar" role="toolbar" aria-label="View and filter controls">
  <div class="tg-toolbar-group">
    <label id="tg-view-label">View:</label>
    <button class="tg-view-btn active" data-view="graveyard" aria-pressed="true" aria-describedby="tg-view-label">Graveyard</button>
    <button class="tg-view-btn" data-view="autopsy" aria-pressed="false" aria-describedby="tg-view-label">Autopsy</button>
    <button class="tg-view-btn" data-view="statistics" aria-pressed="false" aria-describedby="tg-view-label">Statistics</button>
  </div>
  <div class="sep" aria-hidden="true"></div>
  <div class="tg-toolbar-group">
    <label id="tg-level-label">Level:</label>
    <button class="tg-level-btn active" data-level="molecule" aria-pressed="true" aria-describedby="tg-level-label">Molecule</button>
    <button class="tg-level-btn" data-level="class" aria-pressed="false" aria-describedby="tg-level-label">Class</button>
  </div>
  <div class="sep" aria-hidden="true"></div>
  <div class="tg-toolbar-group">
    <label>Status:</label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-dead" checked> <span style="color:var(--dead)">Dead</span></label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-declining" checked> <span style="color:var(--declining)">Declining</span></label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-alive"> <span style="color:var(--alive)">Alive</span></label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-zombie" checked> <span style="color:var(--zombie)">Zombie</span></label>
  </div>
  <div class="sep" aria-hidden="true"></div>
  <div class="tg-toolbar-group">
    <label>Type:</label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-drug" checked> Drug</label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-procedure" checked> Procedure</label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-device" checked> Device</label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-biological" checked> Biological</label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-behavioral" checked> Behavioral</label>
    <label class="tg-cb-group"><input type="checkbox" id="tg-f-radiation" checked> Radiation</label>
  </div>
  <div class="sep" aria-hidden="true"></div>
  <div class="tg-toolbar-group">
    <label for="tg-f-category">Category:</label>
    <select id="tg-f-category" aria-label="Filter by therapeutic category">
      <option value="all">All</option>
    </select>
  </div>
  <div class="sep" aria-hidden="true"></div>
  <div class="tg-toolbar-group">
    <label for="tg-search">Search:</label>
    <input type="text" id="tg-search" placeholder="Filter interventions..."
      style="background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:0.82rem;width:160px;"
      aria-label="Search interventions">
  </div>
  <button class="tg-export-btn" id="tg-csv-export" aria-label="Export data as CSV">Export CSV</button>
</nav>

<!-- ===== MAIN CONTENT ===== -->
<main class="tg-main" role="main" id="tg-main-content" tabindex="-1">
  <!-- Graveyard View -->
  <div class="tg-view active" id="tg-view-graveyard">
    <div class="tg-graveyard-info" id="tg-graveyard-info" aria-live="polite" role="status"></div>
    <div id="tg-graveyard-chart" role="img" aria-label="Heatmap of cardiovascular intervention trial activity by year"></div>
    <div id="tg-graveyard-kbd-list" class="tg-kbd-list" style="margin-top:8px;"></div>
  </div>

  <!-- Autopsy View -->
  <div class="tg-view" id="tg-view-autopsy">
    <div class="tg-autopsy-header">
      <button class="tg-back-btn" id="tg-back-btn" aria-label="Back to Graveyard view">&larr; Back</button>
      <span class="tg-autopsy-title" id="tg-autopsy-name"></span>
      <span class="tg-status-badge" id="tg-autopsy-badge"></span>
    </div>
    <div class="tg-autopsy-chart" id="tg-autopsy-chart" role="img" aria-label="Trial count over time for selected intervention"></div>
    <div id="tg-kill-panel-container"></div>
    <div class="tg-metrics-row" id="tg-autopsy-metrics"></div>
    <div class="tg-class-context" id="tg-class-context"></div>
  </div>

  <!-- Statistics View -->
  <div class="tg-view" id="tg-view-statistics">
    <div class="tg-stats-grid">
      <div class="tg-stat-card">
        <h3>Status Distribution</h3>
        <div class="tg-stat-chart" id="tg-stat-pie" role="img" aria-label="Pie chart of intervention status distribution"></div>
      </div>
      <div class="tg-stat-card">
        <h3>Deaths by Period</h3>
        <div class="tg-stat-chart" id="tg-stat-period" role="img" aria-label="Bar chart of deaths by time period"></div>
      </div>
      <div class="tg-stat-card">
        <h3>Kill Cause Breakdown</h3>
        <div class="tg-stat-chart" id="tg-stat-causes" role="img" aria-label="Horizontal bar chart of kill event cause categories"></div>
      </div>
      <div class="tg-stat-card">
        <h3>Survival Curve</h3>
        <div class="tg-stat-chart" id="tg-stat-survival" role="img" aria-label="Kaplan-Meier survival curve of intervention lifespan"></div>
      </div>
      <div class="tg-stat-card">
        <h3>Class Mortality Table</h3>
        <div class="tg-table-wrap" id="tg-stat-class-table"></div>
      </div>
      <div class="tg-stat-card">
        <h3>Top 10 Wasted Investment (Dead Interventions)</h3>
        <div class="tg-table-wrap" id="tg-stat-wasted-table"></div>
      </div>
    </div>
  </div>
</main>

/* ---------- CONSTANTS ---------- */
const YEARS = [];
for (let y = TG_DATA.start_year; y <= TG_DATA.end_year; y++) YEARS.push(y);
const STATUS_COLORS = { DEAD: '#dc3545', DECLINING: '#fd7e14', ALIVE: '#198754', ZOMBIE: '#6f42c1' };
const STATUS_ORDER = ['DEAD', 'DECLINING', 'ALIVE', 'ZOMBIE'];

/* ---------- STATE ---------- */
const STATE = {
  view: 'graveyard',
  level: 'molecule',
  statuses: new Set(['DEAD', 'DECLINING', 'ZOMBIE']),
  types: new Set(['drug', 'procedure', 'device', 'biological', 'behavioral', 'radiation']),
  category: 'all',
  search: '',
  autopsyTarget: null
};

/* ---------- INIT ---------- */
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  populateCategories();
  bindToolbar();
  renderCurrentView();
});

/* ---------- THEME ---------- */
function initTheme() {
  const stored = localStorage.getItem('tg_theme') ?? 'light';
  if (stored === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('tg-theme-toggle').textContent = 'Light Mode';
  }
  document.getElementById('tg-theme-toggle').addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('tg_theme', 'light');
      document.getElementById('tg-theme-toggle').textContent = 'Dark Mode';
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('tg_theme', 'dark');
      document.getElementById('tg-theme-toggle').textContent = 'Light Mode';
    }
    renderCurrentView();
  });
}

/* ---------- CATEGORIES ---------- */
function populateCategories() {
  const cats = new Set();
  TG_DATA.molecules.forEach(m => cats.add(m.category));
  TG_DATA.classes.forEach(c => cats.add(c.category));
  const sel = document.getElementById('tg-f-category');
  Array.from(cats).sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c.replace(/_/g, ' ');
    sel.appendChild(opt);
  });
}

/* ---------- TOOLBAR BINDING ---------- */
function bindToolbar() {
  // View buttons
  document.querySelectorAll('.tg-view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tg-view-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      STATE.view = btn.dataset.view;
      showView(STATE.view);
      renderCurrentView();
    });
  });

  // Level buttons
  document.querySelectorAll('.tg-level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tg-level-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      STATE.level = btn.dataset.level;
      renderCurrentView();
    });
  });

  // Status checkboxes
  ['dead', 'declining', 'alive', 'zombie'].forEach(s => {
    const cb = document.getElementById('tg-f-' + s);
    cb.addEventListener('change', () => {
      const key = s.toUpperCase();
      if (cb.checked) STATE.statuses.add(key);
      else STATE.statuses.delete(key);
      renderCurrentView();
    });
  });

  // Type checkboxes
  ['drug', 'procedure', 'device', 'biological', 'behavioral', 'radiation'].forEach(t => {
    const cb = document.getElementById('tg-f-' + t);
    cb.addEventListener('change', () => {
      if (cb.checked) STATE.types.add(t);
      else STATE.types.delete(t);
      renderCurrentView();
    });
  });

  // Category dropdown
  document.getElementById('tg-f-category').addEventListener('change', e => {
    STATE.category = e.target.value;
    renderCurrentView();
  });

  // Search
  let searchTimer = null;
  document.getElementById('tg-search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      STATE.search = e.target.value.trim().toLowerCase();
      renderCurrentView();
    }, 200);
  });

  // Back button
  document.getElementById('tg-back-btn').addEventListener('click', () => {
    STATE.view = 'graveyard';
    document.querySelectorAll('.tg-view-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-pressed', 'false');
      if (b.dataset.view === 'graveyard') {
        b.classList.add('active');
        b.setAttribute('aria-pressed', 'true');
      }
    });
    showView('graveyard');
    renderCurrentView();
  });

  // CSV export
  document.getElementById('tg-csv-export').addEventListener('click', exportCSV);
}

/* ---------- VIEW SWITCHING ---------- */
function showView(viewName) {
  document.querySelectorAll('.tg-view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('tg-view-' + viewName);
  if (el) {
    el.classList.add('active');
    // Focus management: move focus to the active view container
    if (!el.hasAttribute('tabindex')) el.setAttribute('tabindex', '-1');
    setTimeout(() => el.focus(), 50);
  }
}

function renderCurrentView() {
  if (STATE.view === 'graveyard') renderGraveyard();
  else if (STATE.view === 'autopsy') renderAutopsy();
  else if (STATE.view === 'statistics') renderStatistics();
}

/* ---------- DATA FILTERING ---------- */
function getFilteredData() {
  const src = STATE.level === 'molecule' ? TG_DATA.molecules : TG_DATA.classes;
  return src.filter(item => {
    if (!STATE.statuses.has(item.status)) return false;
    if (!STATE.types.has(item.classified_type)) return false;
    if (STATE.category !== 'all' && item.category !== STATE.category) return false;
    if (STATE.search && !item.intervention.toLowerCase().includes(STATE.search)) return false;
    return true;
  });
}

/* ---------- PLOTLY HELPERS ---------- */
function getPlotlyStyle() {
  const cs = getComputedStyle(document.documentElement);
  return {
    fontColor: cs.getPropertyValue('--text').trim(),
    gridColor: cs.getPropertyValue('--border').trim(),
    bgCard: cs.getPropertyValue('--bg-card').trim()
  };
}

function plotlyUpdate(el, traces, layout, config) {
  config = config || { responsive: true, displayModeBar: false };
  const fn = el._hasPlot ? Plotly.react : Plotly.newPlot;
  fn(el, traces, layout, config);
  el._hasPlot = true;
}

/* ---------- ESCAPE HTML ---------- */
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* ---------- GRAVEYARD VIEW ---------- */
function renderGraveyard() {
  const data = getFilteredData();
  const info = document.getElementById('tg-graveyard-info');
  info.textContent = 'Showing ' + data.length + ' interventions (' + STATE.level + ' level). Click a row to open Autopsy view.';

  const el = document.getElementById('tg-graveyard-chart');

  if (data.length === 0) {
    if (el._hasPlot) { Plotly.purge(el); el._hasPlot = false; }

    document.getElementById('tg-graveyard-kbd-list').innerHTML = '';

  const heatmap = {

      [0, 'rgba(0,0,0,0)'],
      [0.01, 'rgba(13,110,253,0.08)'],
      [0.15, 'rgba(13,110,253,0.25)'],
      [0.4, 'rgba(13,110,253,0.5)'],
      [0.7, 'rgba(13,110,253,0.75)'],
      [1.0, '#0d6efd']
    ],
    showscale: true,
    colorbar: {
      title: { text: 'Trials', font: { size: 11 } },
      thickness: 12,
      len: 0.5
    },
    hovertemplate: '<b>%{y}</b><br>Year: %{x}<br>Trials: %{z:.1f}<extra></extra>',
    xgap: 1,
    ygap: 1
  };

  // Kill event markers overlay
  const killX = [], killY = [], killText = [];
  TG_DATA.kill_events.forEach(ke => {
    const targets = STATE.level === 'molecule' ? ke.interventions : ke.classes;
    targets.forEach(intv => {
      if (interventions.includes(intv)) {
        killX.push(ke.year);
        killY.push(intv);
        killText.push(ke.event);
      }
    });
  });

  const killMarkers = {
    type: 'scatter',
    x: killX,
    y: killY,
    mode: 'markers',
    marker: { symbol: 'diamond', size: 10, color: '#dc3545', line: { color: '#fff', width: 1 } },
    text: killText,
    hovertemplate: '<b>Kill Event</b><br>%{text}<extra></extra>',
    showlegend: false
  };

  const height = Math.max(500, displayData.length * 18 + 100);

  const layout = {
    paper_bgcolor: 'transparent',
    plot_bgcolor: 'transparent',
    font: { color: style.fontColor, size: 10 },
    margin: { t: 10, r: 60, b: 50, l: 200 },
    height: height,
    xaxis: {
      title: { text: 'Year', font: { size: 12 } },
      tickvals: YEARS,
      ticktext: YEARS.map(String),
      gridcolor: style.gridColor,
      tickangle: -45
    },
    yaxis: {
      autorange: true,
      tickfont: { size: 9 },
      gridcolor: style.gridColor
    }
  };

  plotlyUpdate(el, [heatmap, killMarkers], layout);

  // Color y-axis tick labels by status
  setTimeout(() => {
    try {
      const yTicks = el.querySelectorAll('.ytick text');
      yTicks.forEach(tick => {
        const label = tick.textContent;
        const item = displayData.find(d => d.intervention === label);
        if (item) tick.style.fill = STATUS_COLORS[item.status] || style.fontColor;
      });
    } catch(e) { /* ignore */ }
  }, 300);

  // Click handler for drill-down
  el.removeAllListeners && el.removeAllListeners('plotly_click');
  el.on('plotly_click', evData => {
    if (evData.points && evData.points.length > 0) {
      const pt = evData.points[0];
      let name = pt.y;
      if (!name && pt.pointIndex) {
        const idx = Array.isArray(pt.pointIndex) ? pt.pointIndex[0] : pt.pointIndex;
        name = pt.data.y[idx];
      }
      if (name) openAutopsy(name);
    }
  });

  // Keyboard-accessible intervention list (P1-14)
  const kbdList = document.getElementById('tg-graveyard-kbd-list');
  let kbdH = '<div role="list" aria-label="Intervention list for keyboard navigation">';
  displayData.forEach(d => {
    const dotColor = STATUS_COLORS[d.status] || '#999';
    kbdH += '<div class="tg-kbd-item" role="listitem" tabindex="0" data-intv="' + escapeHtml(d.intervention) + '">';
    kbdH += '<span class="tg-kbd-dot" style="background:' + dotColor + ';" aria-hidden="true"></span>';
    kbdH += escapeHtml(d.intervention.replace(/_/g, ' '));
    kbdH += ' <small style="color:var(--text-muted);">(' + escapeHtml(d.status) + ', peak ' + escapeHtml(String(d.peak_year)) + ')</small>';
    kbdH += '</div>';
  });
  kbdH += '</div>';
  kbdList.innerHTML = kbdH;
  kbdList.querySelectorAll('.tg-kbd-item').forEach(item => {
    const handler = () => { const n = item.dataset.intv; if (n) openAutopsy(n); };
    item.addEventListener('click', handler);
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
    });
  });
}

/* ---------- AUTOPSY VIEW ---------- */
function openAutopsy(interventionName) {
  STATE.autopsyTarget = interventionName;
  STATE.view = 'autopsy';
  document.querySelectorAll('.tg-view-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-pressed', 'false');
    if (b.dataset.view === 'autopsy') {
      b.classList.add('active');
      b.setAttribute('aria-pressed', 'true');
    }
  });
  showView('autopsy');
  renderAutopsy();
}

function renderAutopsy() {
  const name = STATE.autopsyTarget;
  if (!name) {
    document.getElementById('tg-autopsy-name').textContent = 'Select an intervention from the Graveyard view';
    document.getElementById('tg-autopsy-badge').className = 'tg-status-badge';
    document.getElementById('tg-autopsy-badge').textContent = '';
    return;
  }

  // Find item in current level, fallback to other level
  let item = (STATE.level === 'molecule' ? TG_DATA.molecules : TG_DATA.classes).find(m => m.intervention === name);
  if (!item) {
    item = (STATE.level === 'molecule' ? TG_DATA.classes : TG_DATA.molecules).find(m => m.intervention === name);
    if (item) {
      STATE.level = STATE.level === 'molecule' ? 'class' : 'molecule';
      document.querySelectorAll('.tg-level-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
        if (b.dataset.level === STATE.level) {
          b.classList.add('active');
          b.setAttribute('aria-pressed', 'true');
        }
      });
    }
  }
  if (!item) {
    document.getElementById('tg-autopsy-name').textContent = 'Intervention not found: ' + name;
    document.getElementById('tg-autopsy-badge').className = 'tg-status-badge';
    document.getElementById('tg-autopsy-badge').textContent = '';
    return;
  }

  // Title + badge
  document.getElementById('tg-autopsy-name').textContent = item.intervention.replace(/_/g, ' ');
  const badge = document.getElementById('tg-autopsy-badge');
  badge.textContent = item.status;
  badge.className = 'tg-status-badge ' + item.status;

  // Trial count chart
  const style = getPlotlyStyle();
  const maxCount = Math.max(...item.yearly_counts, 1);

  const rawTrace = {
    x: YEARS, y: item.yearly_counts,
    type: 'scatter', mode: 'lines+markers', name: 'Raw Trials',
    line: { color: '#adb5bd', width: 1, dash: 'dot' },
    marker: { size: 4, color: '#adb5bd' }
  };
  const smoothTrace = {
    x: YEARS, y: item.smoothed_counts,
    type: 'scatter', mode: 'lines+markers', name: 'Smoothed',
    line: { color: STATUS_COLORS[item.status] || '#0d6efd', width: 2.5 },
    marker: { size: 5, color: STATUS_COLORS[item.status] || '#0d6efd' }
  };

  const shapes = [];
  const annotations = [];

  // Peak year vertical line
  if (item.peak_year) {
    shapes.push({
      type: 'line',
      x0: item.peak_year, x1: item.peak_year,
      y0: 0, y1: maxCount * 1.1,
      line: { color: '#fd7e14', width: 1.5, dash: 'dash' }
    });
    annotations.push({
      x: item.peak_year, y: maxCount * 1.05,
      text: 'Peak: ' + item.peak_year,
      showarrow: false, font: { size: 10, color: '#fd7e14' }
    });
  }

  // Kill event markers on chart
  if (item.probable_cause && Array.isArray(item.probable_cause)) {
    item.probable_cause.forEach(kc => {
      const yearIdx = kc.year - TG_DATA.start_year;
      const yVal = (yearIdx >= 0 && yearIdx < item.yearly_counts.length) ? item.yearly_counts[yearIdx] : 0;
      shapes.push({
        type: 'line',
        x0: kc.year, x1: kc.year,
        y0: 0, y1: maxCount * 1.1,
        line: { color: '#dc3545', width: 1.5, dash: 'dot' }
      });
      annotations.push({
        x: kc.year, y: yVal,
        text: '\u2666',
        showarrow: true, arrowcolor: '#dc3545', arrowhead: 0, ax: 0, ay: -25,
        font: { size: 14, color: '#dc3545' }
      });
    });
  }

  const chartLayout = {
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: { color: style.fontColor, size: 11 },
    margin: { t: 10, r: 20, b: 40, l: 50 },
    xaxis: {
      title: { text: 'Year', font: { size: 12 } },
      tickvals: YEARS, gridcolor: style.gridColor
    },
    yaxis: {
      title: { text: 'Trial Count', font: { size: 12 } },
      gridcolor: style.gridColor, rangemode: 'tozero'
    },
    shapes: shapes, annotations: annotations,
    legend: { x: 1, y: 1, xanchor: 'right', bgcolor: 'rgba(0,0,0,0)' },
    showlegend: true
  };

  plotlyUpdate(document.getElementById('tg-autopsy-chart'), [rawTrace, smoothTrace], chartLayout);

  // Kill event panel
  const killContainer = document.getElementById('tg-kill-panel-container');
  if (item.probable_cause && Array.isArray(item.probable_cause) && item.probable_cause.length > 0) {
    let h = '<div class="tg-kill-panel"><h3>&#9760; Kill Event' + (item.probable_cause.length > 1 ? 's' : '') + '</h3>';
    item.probable_cause.forEach(kc => {
      const fullKE = TG_DATA.kill_events.find(k => k.id === kc.id);
      const evt = fullKE || kc;
      h += '<div class="kill-event">' + escapeHtml(evt.event || '') + '</div>';
      h += '<div class="kill-meta">';
      h += '<span>Year: <strong>' + escapeHtml(String(evt.year)) + '</strong></span>';
      h += '<span class="kill-cat-badge">' + escapeHtml((evt.category || '').replace(/_/g, ' ')) + '</span>';
      if (evt.source) h += '<span>Source: ' + escapeHtml(evt.source) + '</span>';
      if (evt.doi) h += '<span><a href="https://doi.org/' + escapeHtml(evt.doi) + '" target="_blank" rel="noopener">DOI</a></span>';
      h += '</div>';
      if (evt.impact) h += '<div class="kill-impact">' + escapeHtml(evt.impact) + '</div>';
    });
    h += '</div>';
    killContainer.innerHTML = h;
  } else {
    killContainer.innerHTML = '<div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;">No specific kill event identified for this intervention.</div>';
  }

  // Metrics cards
  const termRate = item.total_trials > 0 ? ((item.total_terminated / item.total_trials) * 100).toFixed(1) + '%' : 'N/A';
  const metrics = [
    { label: 'Lifespan', value: item.lifespan !== null ? item.lifespan + ' yr' : 'N/A' },
    { label: 'Total Trials', value: item.total_trials.toLocaleString() },
    { label: 'Total Enrollment', value: item.total_enrollment.toLocaleString() },
    { label: 'Max Phase', value: item.max_phase || 'N/A' },
    { label: 'Termination Rate', value: termRate },
    { label: 'Half-Life', value: item.half_life !== null ? item.half_life + ' yr' : 'N/A' },
    { label: 'Decline Ratio', value: item.decline_ratio !== null ? (item.decline_ratio * 100).toFixed(0) + '%' : 'N/A' }
  ];
  document.getElementById('tg-autopsy-metrics').innerHTML = metrics.map(m =>
    '<div class="tg-metric-card"><div class="metric-value">' + escapeHtml(String(m.value)) + '</div><div class="metric-label">' + escapeHtml(m.label) + '</div></div>'
  ).join('');

  // Class context sparklines
  renderClassContext(item);
}

function renderClassContext(item) {
  const ctxEl = document.getElementById('tg-class-context');

  // Purge existing sparkline Plotly charts to prevent memory leaks (P1-10)
  ctxEl.querySelectorAll('.spark-chart').forEach(el => {
    if (el._hasPlot) { try { Plotly.purge(el); } catch(e) { /* ignore */ } el._hasPlot = false; }
  });

  if (STATE.level === 'molecule' && item.drug_class) {
    const siblings = TG_DATA.molecules.filter(m => m.drug_class === item.drug_class && m.intervention !== item.intervention);
    if (siblings.length > 0) {
      let h = '<h3>Other molecules in class: ' + escapeHtml(item.drug_class.replace(/_/g, ' ')) + '</h3>';
      h += '<div class="tg-sparkline-grid">';
      const shown = siblings.slice(0, 12);
      shown.forEach(sib => {
        const safeId = 'tg-spark-' + sib.intervention.replace(/[^a-zA-Z0-9]/g, '_');
        h += '<div class="tg-sparkline-card" data-intervention="' + escapeHtml(sib.intervention) + '" role="button" tabindex="0">';
        h += '<div class="spark-name" style="color:' + (STATUS_COLORS[sib.status] || 'inherit') + '">';
        h += escapeHtml(sib.intervention.replace(/_/g, ' ')) + ' <small>(' + escapeHtml(sib.status) + ')</small></div>';
        h += '<div class="spark-chart" id="' + safeId + '"></div>';
        h += '</div>';
      });
      h += '</div>';
      ctxEl.innerHTML = h;

      // Render sparklines after DOM
      setTimeout(() => {
        shown.forEach(sib => {
          const safeId = 'tg-spark-' + sib.intervention.replace(/[^a-zA-Z0-9]/g, '_');
          const sparkEl = document.getElementById(safeId);
          if (!sparkEl) return;
          plotlyUpdate(sparkEl, [{
            x: YEARS, y: sib.smoothed_counts,
            type: 'scatter', mode: 'lines',
            line: { color: STATUS_COLORS[sib.status] || '#0d6efd', width: 1.5 },
            fill: 'tozeroy',
            fillcolor: (STATUS_COLORS[sib.status] || '#0d6efd') + '15'
          }], {
            paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
            margin: { t: 2, r: 4, b: 2, l: 4 },
            xaxis: { visible: false }, yaxis: { visible: false, rangemode: 'tozero' },
            showlegend: false, height: 50
          });
        });

        // Click handlers for sparkline cards
        ctxEl.querySelectorAll('.tg-sparkline-card').forEach(card => {
          const handler = () => {
            const intv = card.dataset.intervention;
            if (intv) openAutopsy(intv);
          };
          card.addEventListener('click', handler);
          card.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
          });
        });
      }, 100);
    } else {
      ctxEl.innerHTML = '<div style="font-size:0.85rem;color:var(--text-muted);">No other molecules in this class.</div>';
    }
  } else if (STATE.level === 'class' && item.member_molecules) {
    let h = '<h3>Member molecules (' + item.member_molecules.length + ')</h3>';
    h += '<div style="font-size:0.85rem;color:var(--text-muted);line-height:1.8;">';
    h += item.member_molecules.map(m => {
      const mol = TG_DATA.molecules.find(x => x.intervention === m);
      const color = mol ? (STATUS_COLORS[mol.status] || 'inherit') : 'inherit';
      return '<span class="tg-mol-badge" style="display:inline-block;margin-right:8px;padding:2px 8px;border-radius:4px;background:var(--badge-bg);color:' + color + ';cursor:pointer;" data-mol="' + escapeHtml(m) + '" role="button" tabindex="0">' + escapeHtml(m.replace(/_/g, ' ')) + '</span>';
    }).join('');
    h += '</div>';
    ctxEl.innerHTML = h;
    // Event delegation for molecule badges (P1-6 + P1-13)
    ctxEl.querySelectorAll('.tg-mol-badge').forEach(badge => {
      const handler = () => {
        const mol = badge.dataset.mol;
        if (mol) openAutopsy(mol);
      };
      badge.addEventListener('click', handler);
      badge.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
      });
    });
  } else {
    ctxEl.innerHTML = '';
  }
}

function renderSurvivalCurve(data, style, baseLayout) {
  const allItems = data.filter(d => d.lifespan !== null && d.lifespan !== undefined && d.lifespan > 0);
  const totalN = allItems.length;
  if (totalN === 0) return;

  // Build combined event list: deaths (event=1) and censorings (event=0)
  const events = [];
  allItems.forEach(d => {
    if (d.status === 'DEAD') {
      events.push({ time: d.lifespan, event: 1 }); // death
    } else {
      events.push({ time: d.lifespan, event: 0 }); // censored (ALIVE/DECLINING/ZOMBIE)
    }
  });
  // Sort by time ascending; deaths before censorings at same time
  events.sort((a, b) => a.time !== b.time ? a.time - b.time : b.event - a.event);

  // Build KM step function with proper censoring
  const kmX = [0], kmY = [1.0];
  let nAtRisk = totalN, prevSurv = 1.0, idx = 0;

  while (idx < events.length) {
    const t = events[idx].time;
    let deaths = 0;
    let censored = 0;
    // Count all events at this time point
    while (idx < events.length && events[idx].time === t) {
      if (events[idx].event === 1) deaths++;
      else censored++;
      idx++;
    }
    if (deaths > 0) {
      const surv = prevSurv * (1 - deaths / nAtRisk);
      kmX.push(t); kmY.push(prevSurv);  // horizontal step
      kmX.push(t); kmY.push(surv);      // vertical drop
      prevSurv = surv;
    }
    nAtRisk -= (deaths + censored);
    if (nAtRisk <= 0) break;
  }

  const maxLS = Math.max(...allItems.map(d => d.lifespan || 0), 21);
  kmX.push(maxLS); kmY.push(prevSurv);

  plotlyUpdate(document.getElementById('tg-stat-survival'), [{
    x: kmX, y: kmY, type: 'scatter', mode: 'lines',
    line: { color: '#0d6efd', width: 2 },
    fill: 'tozeroy', fillcolor: 'rgba(13,110,253,0.1)',
    hovertemplate: 'Years: %{x}<br>Survival: %{y:.1%}<extra></extra>'
  }], {
    ...baseLayout,
    margin: { t: 10, r: 10, b: 40, l: 55 },
    xaxis: {
      title: { text: 'Years from First Trial', font: { size: 11 } },
      gridcolor: style.gridColor, rangemode: 'tozero'
    },
    yaxis: {
      title: { text: 'Proportion Active', font: { size: 11 } },
      gridcolor: style.gridColor, range: [0, 1.05], tickformat: '.0%'
    }
  });
}

function renderClassMortalityTable(data) {
  const classSummary = {};
  data.forEach(d => {
    const cls = d.drug_class || d.category || 'unknown';
    if (!classSummary[cls]) classSummary[cls] = { dead: 0, total: 0, halfLives: [] };
    classSummary[cls].total++;
    if (d.status === 'DEAD') classSummary[cls].dead++;
    if (d.half_life !== null && d.half_life !== undefined) classSummary[cls].halfLives.push(d.half_life);
  });

  const rows = Object.entries(classSummary)
    .map(([cls, s]) => ({
      cls: cls.replace(/_/g, ' '),
      dead: s.dead, total: s.total,
      rate: s.total > 0 ? s.dead / s.total : 0,
      avgHL: s.halfLives.length > 0 ? (s.halfLives.reduce((a,b) => a+b, 0) / s.halfLives.length).toFixed(1) : 'N/A'
    }))
    .filter(r => r.total >= 2)
    .sort((a, b) => b.rate - a.rate);

  let h = '<table class="tg-table" aria-label="Class mortality table"><caption>Class Mortality Analysis</caption><thead><tr>';
  h += '<th scope="col">Class</th><th scope="col">Dead</th><th scope="col">Total</th><th scope="col">Attrition Rate</th><th scope="col">Avg Half-Life</th>';
  h += '</tr></thead><tbody>';
  rows.forEach(r => {
    const pct = (r.rate * 100).toFixed(1) + '%';
    const barColor = r.rate > 0.6 ? '#dc3545' : r.rate > 0.3 ? '#fd7e14' : '#198754';
    h += '<tr>';
    h += '<td>' + escapeHtml(r.cls) + '</td>';
    h += '<td>' + r.dead + '</td>';
    h += '<td>' + r.total + '</td>';
    h += '<td><div style="display:flex;align-items:center;gap:6px;">';
    h += '<div style="width:60px;height:8px;background:var(--border);border-radius:4px;overflow:hidden;">';
    h += '<div style="width:' + (r.rate * 100) + '%;height:100%;background:' + barColor + ';border-radius:4px;"></div></div>';
    h += '<span>' + pct + '</span></div></td>';
    h += '<td>' + r.avgHL + (r.avgHL !== 'N/A' ? ' yr' : '') + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  document.getElementById('tg-stat-class-table').innerHTML = h;
}

function renderWastedTable(data) {
  const dead = data.filter(d => d.status === 'DEAD')
    .sort((a, b) => b.total_enrollment - a.total_enrollment)
    .slice(0, 10);

  let h = '<table class="tg-table" aria-label="Top 10 wasted investment"><caption>Top 10 Wasted Investment</caption><thead><tr>';
  h += '<th scope="col">Intervention</th><th scope="col">Class</th><th scope="col">Trials</th><th scope="col">Enrollment</th><th scope="col">Peak Year</th><th scope="col">Kill Event</th>';
  h += '</tr></thead><tbody>';
  dead.forEach(d => {
    const killEvt = (d.probable_cause && Array.isArray(d.probable_cause) && d.probable_cause.length > 0)
      ? (d.probable_cause[0].event || '') : '';
    const truncEvt = killEvt.length > 80 ? killEvt.substring(0, 80) + '...' : killEvt;
    h += '<tr>';
    h += '<td style="cursor:pointer;color:var(--accent);text-decoration:underline;" data-autopsy="' + escapeHtml(d.intervention) + '">';
    h += escapeHtml(d.intervention.replace(/_/g, ' ')) + '</td>';
    h += '<td>' + escapeHtml((d.drug_class || '').replace(/_/g, ' ')) + '</td>';
    h += '<td>' + d.total_trials.toLocaleString() + '</td>';
    h += '<td>' + d.total_enrollment.toLocaleString() + '</td>';
    h += '<td>' + (d.peak_year || 'N/A') + '</td>';
    h += '<td style="white-space:normal;max-width:250px;">' + escapeHtml(truncEvt) + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  document.getElementById('tg-stat-wasted-table').innerHTML = h;

  // Bind click handlers for intervention names
  document.querySelectorAll('#tg-stat-wasted-table [data-autopsy]').forEach(el => {
    el.addEventListener('click', () => openAutopsy(el.dataset.autopsy));
  });
}

/* ---------- CSV EXPORT ---------- */
function exportCSV() {
  const src = STATE.level === 'molecule' ? TG_DATA.molecules : TG_DATA.classes;
  const cols = ['intervention', 'intervention_type', 'status', 'classified_type', 'drug_class', 'category',
    'total_trials', 'total_enrollment', 'total_terminated', 'max_phase', 'industry_count',
    'peak_year', 'peak_count', 'recent_count', 'decline_ratio', 'years_silent',
    'half_life', 'lifespan', 'trial_count_unique'];

  let csv = cols.join(',') + '\n';
  src.forEach(item => {
    csv += cols.map(c => {
      let v = item[c];
      if (v === null || v === undefined) return '';
      v = String(v);
      // CSV formula injection protection (do NOT include '-' as it corrupts negative values)
      if (/^[=+@\t\r]/.test(v)) v = "'" + v;
      if (v.includes(',') || v.includes('"') || v.includes('\n')) {
        v = '"' + v.replace(/"/g, '""') + '"';
      }
      return v;
    }).join(',') + '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'therapy_graveyard_' + STATE.level + '_data.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
